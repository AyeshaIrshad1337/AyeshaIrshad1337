<svg xmlns="http://www.w3.org/2000/svg" width="850" height="145" viewBox="0 0 850 145">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1321"/>
    </linearGradient>
    <filter id="sg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="linkedinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A66C2"/>
      <stop offset="100%" style="stop-color:#0077B5"/>
    </linearGradient>
    <linearGradient id="gmailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4335"/>
      <stop offset="100%" style="stop-color:#FF6D5A"/>
    </linearGradient>
    <linearGradient id="ghGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6e40c9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect fill="url(#sbg)" width="850" height="145" rx="10"/>
  <rect x="0.5" y="0.5" width="849" height="144" rx="10" fill="none" stroke="#1a2340"/>

  <!-- Title bar -->
  <rect fill="#0f1525" width="850" height="32" rx="10"/>
  <rect fill="#0f1525" y="22" width="850" height="10"/>
  <circle fill="#ff5f56" cx="18" cy="16" r="5.5"/>
  <circle fill="#ffbd2e" cx="36" cy="16" r="5.5"/>
  <circle fill="#27c93f" cx="54" cy="16" r="5.5"/>
  <text fill="#3d4f6f" font-family="monospace" font-size="11.5" x="425" y="20" text-anchor="middle">ayesha@codebreaker — connect --socials</text>
  <line x1="0" y1="32" x2="850" y2="32" stroke="#1a2340"/>

  <!-- Prompt -->
  <text fill="#7b61ff" font-family="monospace" font-weight="bold" font-size="13" x="24" y="58">❯</text>
  <text fill="#00ff9f" font-family="monospace" font-size="13" x="42" y="58" filter="url(#sg)">connect --list</text>

  <!-- ═══ LinkedIn Card ═══ -->
  <g transform="translate(24, 72)">
    <rect fill="#111827" width="245" height="52" rx="8"/>
    <rect x="0.5" y="0.5" width="244" height="51" rx="8" fill="none" stroke="#1e2a45" stroke-width="0.5"/>
    <!-- LinkedIn accent bar -->
    <rect fill="url(#linkedinGrad)" width="3" height="52" rx="1.5"/>
    <!-- Icon -->
    <rect fill="#0A66C2" x="16" y="12" width="28" height="28" rx="6"/>
    <text fill="#ffffff" font-family="Arial,sans-serif" font-weight="bold" font-size="18" x="23" y="33">in</text>
    <!-- Text -->
    <text fill="#c9d1d9" font-family="monospace" font-weight="bold" font-size="12" x="54" y="25">LinkedIn</text>
    <text fill="#0A66C2" font-family="monospace" font-size="10" x="54" y="40">/in/ayesha-irshad</text>
  </g>

  <!-- ═══ Gmail Card ═══ -->
  <g transform="translate(285, 72)">
    <rect fill="#111827" width="280" height="52" rx="8"/>
    <rect x="0.5" y="0.5" width="279" height="51" rx="8" fill="none" stroke="#1e2a45" stroke-width="0.5"/>
    <!-- Gmail accent bar -->
    <rect fill="url(#gmailGrad)" width="3" height="52" rx="1.5"/>
    <!-- Icon -->
    <rect fill="#EA4335" x="16" y="12" width="28" height="28" rx="6"/>
    <!-- Envelope shape -->
    <polygon fill="#ffffff" points="22,22 30,28 38,22" opacity="0.95"/>
    <rect fill="none" stroke="#ffffff" stroke-width="1.5" x="22" y="22" width="16" height="12" rx="1.5" opacity="0.7"/>
    <!-- Text -->
    <text fill="#c9d1d9" font-family="monospace" font-weight="bold" font-size="12" x="54" y="25">Email</text>
    <text fill="#EA4335" font-family="monospace" font-size="10" x="54" y="40">ayeshaitshad124@gmail.com</text>
  </g>

  <!-- ═══ GitHub Card ═══ -->
  <g transform="translate(581, 72)">
    <rect fill="#111827" width="245" height="52" rx="8"/>
    <rect x="0.5" y="0.5" width="244" height="51" rx="8" fill="none" stroke="#1e2a45" stroke-width="0.5"/>
    <!-- GH accent bar -->
    <rect fill="url(#ghGrad)" width="3" height="52" rx="1.5"/>
    <!-- Icon -->
    <rect fill="#6e40c9" x="16" y="12" width="28" height="28" rx="6"/>
    <!-- GH octocat simplified -->
    <circle fill="#ffffff" cx="30" cy="24" r="8"/>
    <circle fill="#6e40c9" cx="30" cy="23" r="4.5"/>
    <ellipse fill="#ffffff" cx="30" cy="21.5" rx="3.2" ry="3.8"/>
    <circle fill="#6e40c9" cx="30" cy="20.5" r="2"/>
    <rect fill="#ffffff" x="26" y="28" width="1.8" height="3.5" rx="0.9"/>
    <rect fill="#ffffff" x="32.2" y="28" width="1.8" height="3.5" rx="0.9"/>
    <!-- Text -->
    <text fill="#c9d1d9" font-family="monospace" font-weight="bold" font-size="12" x="54" y="25">GitHub</text>
    <text fill="#8b5cf6" font-family="monospace" font-size="10" x="54" y="40">AyeshaIrshad1337</text>
  </g>
</svg>
