<svg xmlns="http://www.w3.org/2000/svg" width="850" height="195" viewBox="0 0 850 195">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1321"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b61ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7b61ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff9f;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeSlide1 { 0%,15%{opacity:0;transform:translateX(-8px)} 25%,100%{opacity:1;transform:translateX(0)} }
    @keyframes fadeSlide2 { 0%,30%{opacity:0;transform:translateX(-8px)} 40%,100%{opacity:1;transform:translateX(0)} }
    @keyframes fadeSlide3 { 0%,50%{opacity:0;transform:translateX(-8px)} 60%,100%{opacity:1;transform:translateX(0)} }
    @keyframes fadeSlide4 { 0%,65%{opacity:0;transform:translateX(-8px)} 75%,100%{opacity:1;transform:translateX(0)} }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
  </style>

  <!-- BG -->
  <rect fill="url(#headerGrad)" width="850" height="195" rx="10"/>
  <rect x="0.5" y="0.5" width="849" height="194" rx="10" fill="none" stroke="#1a2340" stroke-width="1"/>
  
  <!-- Glow line -->
  <rect fill="url(#glowGrad)" y="32" width="850" height="1"/>

  <!-- Title bar -->
  <rect fill="#0f1525" width="850" height="32" rx="10"/>
  <rect fill="#0f1525" y="20" width="850" height="12"/>
  <circle fill="#ff5f56" cx="18" cy="16" r="5.5"/>
  <circle fill="#ffbd2e" cx="36" cy="16" r="5.5"/>
  <circle fill="#27c93f" cx="54" cy="16" r="5.5"/>
  <text fill="#3d4f6f" font-family="monospace" font-size="11.5" x="425" y="20" text-anchor="middle">ayesha@codebreaker — zsh — 120×40</text>

  <!-- Line 1 -->
  <g style="animation:fadeSlide1 2.5s ease-out both">
    <text fill="#7b61ff" font-family="monospace" font-weight="bold" font-size="13" x="22" y="58">❯</text>
    <text fill="#00ff9f" font-family="monospace" font-size="13" x="40" y="58" filter="url(#glow)">whoami --verbose</text>
  </g>

  <!-- Line 2: Name -->
  <g style="animation:fadeSlide2 2.5s ease-out both">
    <text fill="#00ff9f" font-family="monospace" font-weight="bold" font-size="24" x="22" y="90" filter="url(#glow)">Ayesha Irshad</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="230" y="90">│</text>
    <text fill="#8b95a8" font-family="monospace" font-size="12.5" x="245" y="90">Solo Founder  ·  AI Engineer  ·  Full-Stack Builder</text>
  </g>

  <!-- Line 3 -->
  <g style="animation:fadeSlide3 2.5s ease-out both">
    <text fill="#7b61ff" font-family="monospace" font-weight="bold" font-size="13" x="22" y="120">❯</text>
    <text fill="#00ff9f" font-family="monospace" font-size="13" x="40" y="120" filter="url(#glow)">cat motto.txt</text>
  </g>

  <!-- Line 4: Motto -->
  <g style="animation:fadeSlide4 2.5s ease-out both">
    <text fill="#ff6ac1" font-family="monospace" font-size="13" x="22" y="148" font-style="italic">"I may not be Alan Turing, but I am confident enough to be the next codebreaker."</text>
  </g>

  <!-- Line 5: prompt -->
  <g style="animation:fadeSlide4 2.5s ease-out both">
    <text fill="#7b61ff" font-family="monospace" font-weight="bold" font-size="13" x="22" y="178">❯</text>
    <text fill="#00ff9f" font-family="monospace" font-size="13" x="40" y="178" filter="url(#glow)">shipping</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="110" y="178">→</text>
    <text fill="#c9d1d9" font-family="monospace" font-size="13" x="130" y="178">Codet.ai</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="210" y="178">·</text>
    <text fill="#c9d1d9" font-family="monospace" font-size="13" x="225" y="178">DiffSpy</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="290" y="178">·</text>
    <text fill="#c9d1d9" font-family="monospace" font-size="13" x="305" y="178">NEXUS</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="365" y="178">·</text>
    <text fill="#c9d1d9" font-family="monospace" font-size="13" x="380" y="178">ETA</text>
    <text fill="#3d4f6f" font-family="monospace" font-size="13" x="435" y="178">@</text>
    <text fill="#ff6ac1" font-family="monospace" font-size="13" x="450" y="178">Ahoy</text>
    <rect fill="#00ff9f" x="498" y="166" width="8" height="15" style="animation:blink 1s step-end infinite"/>
  </g>
</svg>
